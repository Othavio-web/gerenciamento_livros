<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Leituras</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>📚 Meu Controle de Leituras</h1>
  </header>

  <main>
    <form id="form-livro">
      <input type="text" class = "campo-texto" id="titulo" placeholder="Título do livro" required>
      <input type="text" class = "campo-texto" id="autor" placeholder="Autor" required>
      <input type="number" class = "campo-numero" id="paginas" placeholder="Total de páginas" required>
      <button type="submit" class = "botao">Adicionar</button>
    </form>

    <section id="lista-livros">
      <h2>Lista de Leituras</h2>
      <ul id="livros"></ul>
    </section>

    <section id="progresso">
      <h2>Progresso Geral</h2>
      <div id="barra-container">
        <div id="barra"></div>
      </div>
      <p id="texto-progresso"></p>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
